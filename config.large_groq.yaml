# Configuración para procesar video largo con Groq
# Video: test_large.mp4 (2.4h) - Podcast de filosofía

asr_provider: groq
asr_model: whisper-large-v3-turbo
llm_provider: deepseek
llm_model: deepseek-v4-flash

input_video: sources/test_large.mp4
project_name: test_large_groq
output_dir: ./output

language: es
preferred_chapters: 12  # Para 2.4h de podcast, 12 capítulos es razonable
max_budget_usd: 5.0

chunk_duration_minutes: 8
chunk_overlap_seconds: 5
keep_checkpoints: true
