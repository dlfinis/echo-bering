asr_provider: groq
asr_model: whisper-large-v3-turbo
llm_provider: deepseek
llm_model: deepseek-v4-flash
input_video: ./sources/test_1m.mp4
output_dir: ./output_test_groq_optimized
language: es
cut_mode: fast
max_budget_usd: 0.25
chunk_duration_minutes: 5

# Processing optimization
batch_processing: true
word_timestamps: false  # Groq doesn't support word-level timestamps
segment_timestamps: true  # Use segment-level timestamps for timing